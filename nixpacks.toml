# nixpacks.toml — Railway build config for StockGuru
# Ensures correct Python version and pip install flags

[phases.setup]
nixPkgs = ["python310", "python310Packages.pip"]

[phases.install]
cmds = [
  "pip install -r requirements.txt --no-cache-dir"
]

[start]
cmd = "gunicorn app:app --config gunicorn.conf.py"
