# nixpacks.toml — Railway build config for StockGuru
# Uses a virtualenv to avoid the Nix externally-managed-environment error

[phases.setup]
nixPkgs = ["python310", "gcc", "libxml2", "libxslt", "openssl", "zlib", "pkg-config"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip --no-cache-dir",
  "/opt/venv/bin/pip install -r requirements.txt --no-cache-dir"
]

[start]
cmd = "/opt/venv/bin/gunicorn app:app --config gunicorn.conf.py"
